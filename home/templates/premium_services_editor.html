{% extends 'base1.html' %}
{% block title %}Premium Services Editor{% endblock %}

{% block content %}
<style>
  .ps-wrap { max-width: 1200px; margin: 20px auto; padding: 0 12px; }
  .ps-card { background:#fff; border:1px solid #e4ecf7; border-radius:14px; box-shadow:0 8px 20px rgba(0,0,0,.08); }
  .ps-head { padding:14px 16px; border-bottom:1px solid #edf2fb; }
  .ps-head h2 { margin:0; color:#1e3f67; font-size:1.15rem; }
  .ps-sub { margin:4px 0 0; font-size:.86rem; color:#6d8299; }
  .ps-body { padding:12px; }
  .row { border:1px solid #e7eef9; border-radius:10px; padding:10px; margin-bottom:10px; }
  .grid { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:10px; }
  .field label { display:block; font-size:.8rem; color:#59748f; margin-bottom:4px; }
  .field input, .field textarea { width:100%; border:1px solid #d4e1f2; border-radius:8px; padding:8px 9px; font-size:.86rem; }
  .field textarea { min-height:76px; resize:vertical; }
  .tools { display:flex; gap:8px; flex-wrap:wrap; justify-content:space-between; align-items:center; margin-top:8px; }
  .btn { border:none; border-radius:8px; padding:9px 12px; font-weight:700; font-size:.84rem; cursor:pointer; }
  .btn-add { background:#eef4ff; color:#1f4d80; }
  .btn-save { background:#198754; color:#fff; }
  .active { font-size:.82rem; color:#1f4d80; display:inline-flex; align-items:center; gap:6px; }
  @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }
</style>

<div class="ps-wrap">
  <div class="ps-card">
    <div class="ps-head">
      <h2>Our Premium Services Editor</h2>
      <p class="ps-sub">No navigation link added. Use this direct page to edit all service cards.</p>
    </div>
    <div class="ps-body">
      <form method="post" id="servicesForm">
        {% csrf_token %}
        <div id="rows">
          {% for s in services %}
          <div class="row">
            <input type="hidden" name="service_id[]" value="{{ s.id }}">
            <div class="grid">
              <div class="field"><label>Title</label><input type="text" name="title[]" value="{{ s.title }}"></div>
              <div class="field"><label>Image URL</label><input type="text" name="image_url[]" value="{{ s.image_url }}"></div>
              <div class="field"><label>Book Slug</label><input type="text" name="book_slug[]" value="{{ s.book_slug }}"></div>
              <div class="field"><label>Explore Slug</label><input type="text" name="explore_slug[]" value="{{ s.explore_slug }}"></div>
              <div class="field" style="grid-column:1 / -1;"><label>Description</label><textarea name="description[]">{{ s.description }}</textarea></div>
            </div>
            <div class="tools">
              <label class="active"><input type="checkbox" name="active_ids[]" value="{{ s.id }}" {% if s.is_active %}checked{% endif %}> Active</label>
            </div>
          </div>
          {% endfor %}
        </div>
        <div class="tools">
          <button type="button" class="btn btn-add" onclick="addRow()">+ Add New Service</button>
          <button type="submit" class="btn btn-save">Save All Changes</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
function addRow() {
  const rows = document.getElementById('rows');
  const row = document.createElement('div');
  row.className = 'row';
  row.innerHTML = `
    <input type="hidden" name="service_id[]" value="">
    <div class="grid">
      <div class="field"><label>Title</label><input type="text" name="title[]" value=""></div>
      <div class="field"><label>Image URL</label><input type="text" name="image_url[]" value=""></div>
      <div class="field"><label>Book Slug</label><input type="text" name="book_slug[]" value=""></div>
      <div class="field"><label>Explore Slug</label><input type="text" name="explore_slug[]" value=""></div>
      <div class="field" style="grid-column:1 / -1;"><label>Description</label><textarea name="description[]"></textarea></div>
    </div>
    <div class="tools">
      <label class="active"><input type="checkbox" name="active_ids[]" value="" checked disabled> New row is active by default</label>
    </div>
  `;
  rows.appendChild(row);
}
</script>
{% endblock %}
