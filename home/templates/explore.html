<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Explore Our Art | RColorcraft</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f7fb;
}

/* Page Heading */

.page-title{
text-align:center;
padding:40px 20px;
}

.page-title h1{
font-size:40px;
color:#222;
margin-bottom:10px;
}

.page-title p{
color:#666;
}

/* Art Grid */

.art-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
padding:40px 80px;
}

/* Card */

.art-card{
background:white;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
overflow:hidden;
transition:0.3s;
}

.art-card:hover{
transform:translateY(-8px);
}

/* Image */

.art-card img{
width:100%;
height:220px;
object-fit:cover;
}

/* Content */

.art-content{
padding:20px;
text-align:center;
}

.art-content h3{
margin-bottom:10px;
color:#333;
}

.art-content p{
color:#777;
font-size:14px;
margin-bottom:15px;
}

/* Button */

.btn{
display:inline-block;
padding:10px 20px;
background:#1fa2ff;
color:white;
border-radius:25px;
text-decoration:none;
font-size:14px;
}

.btn:hover{
background:#0077ff;
}

</style>
</head>

<body>


<!-- Page Heading -->

<div class="page-title">
<h1>Explore Our Art</h1>
<p>Discover our beautiful wall art and mural painting designs</p>

</div>


<!-- Art Grid -->

<div class="art-grid">

<!-- Card 1 -->

<div class="art-card">
<img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">
<div class="art-content">
<h3>3D Wall Art</h3>
<p>Creative 3D wall designs for homes and offices.</p>
<a href="#" class="btn">Book Service</a>
</div>
</div>

<!-- Card 2 -->

<div class="art-card">
<img src="https://images.unsplash.com/photo-1561214115-f2f134cc4912">
<div class="art-content">
<h3>3D Floor Art</h3>
<p>Unique 3D floor designs that create a realistic illusion.</p>
<a href="#" class="btn">Book Service</a>
</div>
</div>
