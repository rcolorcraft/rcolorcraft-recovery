{% extends "base1.html" %}

{% block title %}Page Not Found (404){% endblock %}

{% block content %}
<style>
  .notfound-wrap {
    min-height: 64vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 16px;
    background: linear-gradient(135deg, #f5f7fa 0%, #dce7fb 55%, #eef4ff 100%);
  }

  .notfound-card {
    width: 100%;
    max-width: 760px;
    border-radius: 22px;
    padding: 34px 28px;
    text-align: center;
    background: #ffffff;
    border: 1px solid rgba(66, 108, 186, 0.12);
    box-shadow: 0 18px 45px rgba(25, 56, 107, 0.15);
  }

  .notfound-badge {
    display: inline-block;
    margin-bottom: 12px;
    padding: 7px 14px;
    border-radius: 999px;
    background: linear-gradient(135deg, #1c79db, #2da1ec);
    color: #fff;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.4px;
  }

  .notfound-title {
    margin: 0 0 12px;
    color: #173d66;
    font-size: 34px;
    font-weight: 800;
    line-height: 1.2;
  }

  .notfound-text {
    margin: 0 auto;
    max-width: 560px;
    color: #516a85;
    font-size: 16px;
    line-height: 1.7;
  }

  .notfound-actions {
    margin-top: 24px;
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .notfound-btn {
    text-decoration: none;
    border-radius: 12px;
    padding: 11px 18px;
    font-size: 14px;
    font-weight: 700;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .notfound-btn-primary {
    color: #fff;
    background: linear-gradient(135deg, #1c79db, #2da1ec);
    box-shadow: 0 10px 20px rgba(30, 121, 219, 0.28);
  }

  .notfound-btn-secondary {
    color: #1c4f85;
    background: #e8f1ff;
    border: 1px solid #c9defa;
  }

  .notfound-btn:hover {
    transform: translateY(-1px);
  }

  @media (max-width: 640px) {
    .notfound-card {
      padding: 28px 18px;
      border-radius: 16px;
    }

    .notfound-title {
      font-size: 27px;
    }
  }
</style>

<section class="notfound-wrap">
  <div class="notfound-card">
    <span class="notfound-badge">ERROR 404</span>
    <h1 class="notfound-title">Page Not Found</h1>
    <p class="notfound-text">
      The page you requested does not exist, may have been moved, or the URL is incorrect.
    </p>
    <div class="notfound-actions">
      <a class="notfound-btn notfound-btn-primary" href="/">Go To Home</a>
      <a class="notfound-btn notfound-btn-secondary" href="/explore/">Explore Services</a>
    </div>
  </div>
</section>
{% endblock %}
